document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"f03a068a-f2d2-4bce-8b59-d4cd3df7e288\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<div style=\"position:relative;min-height:100vh;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#14171F;background:#FBFBFA;padding:16px;box-sizing:border-box\">\n\n  <sc-if value=\"{{ notLoggedIn }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"min-height:480px;background:#EDEEF0;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:24px\">\n      <div style=\"background:#fff;border-radius:16px;padding:1.75rem;width:340px;border:1px solid #E8EBEF\">\n        <div style=\"text-align:center;margin-bottom:20px\">\n          <div style=\"font-size:32px;margin-bottom:8px\">🚚<\u002Fdiv>\n          <div style=\"font-weight:600;font-size:18px\">NeoStrim Delivery<\u002Fdiv>\n          <div style=\"font-size:13px;color:#6A7180;margin-top:4px\">Выберите вашу роль<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:16px\">\n          <sc-for list=\"{{ roleOptions }}\" as=\"r\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ r.onSelect }}\" style=\"{{ r.style }}\">\n              <span style=\"font-size:20px\">{{ r.icon }}<\u002Fspan>\n              <span>{{ r.label }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ onLoginConfirm }}\" disabled=\"{{ loginDisabled }}\" style=\"{{ loginBtnStyle }}\">Войти<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ loggedIn }}\" hint-placeholder-val=\"{{ false }}\">\n    <div>\n      <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #E8EBEF\">\n        <div style=\"display:flex;align-items:center;gap:10px\">\n          <div style=\"{{ logoStyle }}\">🚚<\u002Fdiv>\n          <div>\n            <div style=\"font-weight:600;font-size:15px\">NeoStrim Delivery<\u002Fdiv>\n            <div style=\"font-size:12px;color:#6A7180\">{{ roleLine }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:6px;align-items:center\">\n          <sc-if value=\"{{ showUnread }}\" hint-placeholder-val=\"{{ false }}\">\n            <div onclick=\"{{ onOpenNotifs }}\" style=\"background:#FCEBEB;color:#791F1F;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;cursor:pointer\">🔔 {{ unreadCount }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <button onclick=\"{{ onLogout }}\" style=\"{{ btn.default }}\">Выйти<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:4px;background:#F1F3F6;border-radius:8px;padding:4px;margin-bottom:16px;flex-wrap:wrap\">\n        <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"position:relative\">\n\n        <sc-if value=\"{{ isManagerOrders }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px\">\n              <sc-for list=\"{{ moStats }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div style=\"background:#F1F3F6;border-radius:8px;padding:0.75rem 1rem\">\n                  <div style=\"font-size:12px;color:#6A7180;margin-bottom:4px\">{{ s.label }}<\u002Fdiv>\n                  <div style=\"{{ s.valueStyle }}\">{{ s.value }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:flex-end;margin-bottom:12px\">\n              <button onclick=\"{{ onNewOrder }}\" style=\"{{ btn.primary }}\">+ Новая заявка<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{ moRows }}\" as=\"o\" hint-placeholder-count=\"6\">\n                <div style=\"background:#fff;border:1px solid #E8EBEF;border-radius:12px;padding:1rem 1.25rem\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px\">\n                    <div style=\"min-width:0\">\n                      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap\">\n                        <span style=\"font-weight:600;font-size:14px\">{{ o.id }}<\u002Fspan>\n                        <span style=\"{{ o.typeStyle }}\">{{ o.typeLabel }}<\u002Fspan>\n                        <sc-if value=\"{{ o.urgent }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ o.urgentStyle }}\">СРОЧНО<\u002Fspan><\u002Fsc-if>\n                        <span style=\"{{ o.badgeStyle }}\">{{ o.badgeLabel }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"font-size:14px;margin-bottom:2px\">{{ o.client }}<\u002Fdiv>\n                      <div style=\"font-size:12px;color:#6A7180\">{{ o.meta }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap\">\n                      <sc-if value=\"{{ o.showTransfer }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ o.onTransfer }}\" style=\"{{ btn.default }}\">Передать<\u002Fbutton><\u002Fsc-if>\n                      <sc-if value=\"{{ o.showAddRoute }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ o.onAddRoute }}\" style=\"{{ btn.primary }}\">В маршрут<\u002Fbutton><\u002Fsc-if>\n                      <button onclick=\"{{ o.onDetails }}\" style=\"{{ btn.default }}\">Детали<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isRoutes }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <sc-if value=\"{{ showDraft }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#E6F1FB;border-radius:10px;padding:0.75rem 1rem;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px\">\n                <span style=\"font-size:13px;color:#0C447C\">{{ draftText }}<\u002Fspan>\n                <button onclick=\"{{ onMakeDraft }}\" style=\"{{ btn.primary }}\">Сформировать черновик<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ routeCards }}\" as=\"r\" hint-placeholder-count=\"3\">\n                <div style=\"background:#fff;border:1px solid #E8EBEF;border-radius:12px;padding:1rem 1.25rem\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px\">\n                    <div>\n                      <div style=\"font-weight:600;font-size:14px;margin-bottom:2px\">{{ r.title }}<\u002Fdiv>\n                      <div style=\"font-size:13px;color:#6A7180\">{{ r.sub }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;gap:6px;align-items:center;flex-wrap:wrap\">\n                      <sc-if value=\"{{ r.confirmed }}\" hint-placeholder-val=\"{{ false }}\">\n                        <span style=\"font-size:12px;font-weight:600;color:#27500A;background:#EAF3DE;border-radius:6px;padding:3px 10px\">✓ Подтверждён<\u002Fspan>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ r.notConfirmed }}\" hint-placeholder-val=\"{{ true }}\">\n                        <button onclick=\"{{ r.onConfirm }}\" disabled=\"{{ r.confirmDisabled }}\" style=\"{{ r.confirmStyle }}\">Подтвердить рейс<\u002Fbutton>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div>\n                    <div style=\"display:flex;justify-content:space-between;font-size:12px;color:#6A7180;margin-bottom:4px\">\n                      <span style=\"{{ r.pctSpanStyle }}\">{{ r.pctText }}<\u002Fspan>\n                      <span>{{ r.pctLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"height:6px;background:#F1F3F6;border-radius:4px;overflow:hidden\">\n                      <div style=\"{{ r.barStyle }}\"><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ r.hasOrders }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"margin-top:10px;display:flex;flex-direction:column;gap:4px\">\n                      <sc-for list=\"{{ r.orders }}\" as=\"ro\" hint-placeholder-count=\"2\">\n                        <div style=\"display:flex;justify-content:space-between;font-size:12px;background:#F1F3F6;border-radius:6px;padding:4px 10px\">\n                          <span>{{ ro.left }}<\u002Fspan>\n                          <span style=\"color:#6A7180\">{{ ro.right }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isLoading }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"font-size:13px;color:#6A7180;margin-bottom:12px\">Зелёный 70–100% · Жёлтый 40–70% · Красный &lt;40%<\u002Fdiv>\n            <sc-for list=\"{{ loadNotifs }}\" as=\"n\" hint-placeholder-count=\"2\">\n              <div style=\"b ов к отгрузке\"); },\n        onDetails: () => this.openModal(\"orderDetail\", o.id),\n      })),\n    };\n  }\n  vmDriver() {\n    const routes = this.state.routes;\n    const myRoute = routes.find(r => r.driver === \"Данияр К.\" && r.confirmed) || routes.find(r => r.confirmed);\n    if (!myRoute) return { driverNoRoute: true, driverHasRoute: false };\n    const veh = this.vehicle(myRoute.vehicle);\n    const ro = this.state.orders.filter(o => myRoute.orders.includes(o.id));\n    const heavy = veh && veh.cap >= 3500;\n    return {\n      driverNoRoute: false, driverHasRoute: true,\n      driverHeader: myRoute.id + \" · \" + (veh ? veh.name : \"—\") + \" · \" + myRoute.direction,\n      driverPoints: ro.length + \" точек доставки\",\n      driverHeavy: !!heavy,\n      driverRows: ro.map((o, i) => {\n        const done = o.status === \"delivered\";\n        const dis = !(o.photos && o.photos.length);\n        return {\n          pointLabel: \"Точка \" + (i + 1),\n          badgeLabel: this.badgeLabel(o.status), badgeStyle: this.badgeStyle(o.status),\n          client: o.client, address: o.address, items: o.items, phone: o.phone, hasPhone: !!o.phone,\n          isDone: done, active: !done,\n          cardStyle: { background: \"#fff\", border: \"1px solid #E8EBEF\", borderRadius: 12, padding: \"1rem 1.25rem\", opacity: done ? 0.6 : 1 },\n          deliveredDisabled: dis,\n          deliveredStyle: { ...this.btnStyles().success, opacity: dis ? 0.5 : 1, cursor: dis ? \"not-allowed\" : \"pointer\" },\n          onCall: () => this.addTimeline(o.id, \"Водитель позвонил клиенту перед выездом\"),\n          onPhoto: () => this.openModal(\"photo\", o.id),\n          onDelivered: () => { if (dis) return; this.updateOrder(o.id, { status: \"delivered\" }); this.addTimeline(o.id, \"Доставлено. Подписанная накладная сфотографирована.\"); },\n        };\n      }),\n    };\n  }\n  vmHistory() {\n    const done = this.state.orders.filter(o => o.status === \"delivered\");\n    return {\n      hStats: [\n        { label: \"Доставлено сегодня\", value: done.length, valueStyle: this.statVal(\"#27500A\") },\n        { label: \"Кг перевезено\", value: done.reduce((a, o) => a + o.weight, 0), valueStyle: this.statVal() },\n      ],\n      hEmpty: done.length === 0,\n      hRows: done.map(o => ({ client: o.client, sub: \"📍 \" + o.address + \" · \" + o.weight + \" кг\", badgeLabel: this.badgeLabel(o.status), badgeStyle: this.badgeStyle(o.status) })),\n    };\n  }\n\n  // ---- modal view-models ----\n  vmModal() {\n    const modal = this.state.modal;\n    if (!modal) return { showModal: false };\n    const btn = this.btnStyles();\n    const order = modal.id ? this.state.orders.find(o => o.id === modal.id) : null;\n    const titles = { newOrder: \"Новая заявка\", invoice: order ? \"Накладная — \" + order.id : \"Накладная\", addToRoute: order ? \"Добавить \" + order.id + \" в маршрут\" : \"В маршрут\", orderDetail: order ? \"Заявка \" + order.id : \"Заявка\", photo: \"Фото накладной 2.7\", newTransfer: \"Новое внутреннее перемещение\", notifications: \"Уведомления\" };\n    const base = {\n      showModal: true, modalTitle: titles[modal.type] || \"\",\n      mNewOrder: false, mInvoice: false, mAddRoute: false, mDetail: false, mPhoto: false, mNewTransfer: false, mNotifs: false,\n      onModalClose: () => this.closeModal(),\n      onOverlay: (e) => { if (e.target === e.currentTarget) this.closeModal(); },\n      iStyle: this.iStyle, textareaStyle: { ...this.iStyle, height: 60, resize: \"vertical\" },\n      flexPrimary: { ...btn.primary, flex: 1 }, flexSuccess: { ...btn.success, flex: 1 }, flexDefault: { ...btn.default, flex: 1 },\n    };\n    if (modal.type === \"newOrder\") return { ...base, mNewOrder: true, ...this.vmNewOrder() };\n    if (modal.type === \"invoice\") return { ...base, mInvoice: true, ...this.vmInvoice(order) };\n    if (modal.type === \"addToRoute\") return { ...base, mAddRoute: true, ...this.vmAddRoute(order) };\n    if (modal.type === \"orderDetail\") return { ...base, mDetail: true, ...this.vmDetail(order) };\n    if (modal.type === \"photo\") return { ...base, mPhoto: true, ...this.vmPhoto(order) };\n    if (modal.type === \"newTransfer\") return { ...base, mNewTransfer: true, ...this.vmNewTransfer() };\n    if (modal.type === \"notifications\") return { ...base, mNotifs: true, ...this.vmNotifs() };\n    return base;\n  }\n  vmNewOrder() {\n    const f = this.state.form;\n    return {\n      fType: f.type, fClient: f.client, fPhone: f.phone, fAddress: f.address, fDirection: f.direction, fWeight: f.weight, fItems: f.items, fNotes: f.notes, fUrgency: f.urgency,\n      typeOptions: [\"B2C\", \"B2B\"], directionOptions: this.DIRECTIONS.filter(d => d !== \"Внутреннее\"),\n      onFType: e => this.setForm(\"type\", e.target.value),\n      onFClient: e => this.setForm(\"client\", e.target.value),\n      onFPhone: e => this.setForm(\"phone\", e.target.value),\n      onFAddress: e => this.setForm(\"address\", e.target.value),\n      onFDirection: e => this.setForm(\"direction\", e.target.value),\n      onFWeight: e => this.setForm(\"weight\", e.target.value),\n      onFItems: e => this.setForm(\"items\", e.target.value),\n      onFNotes: e => this.setForm(\"notes\", e.target.value),\n      onFUrgency: e => this.setForm(\"urgency\", e.target.checked),\n      onSaveOrder: () => this.saveNewOrder(),\n    };\n  }\n  vmInvoice(order) {\n    const f = this.state.form;\n    return {\n      ivClient: order.client, ivAddress: order.address, ivPhone: order.phone || \"—\", ivItems: order.items, ivWeight: order.weight + \" кг\",\n      fInvoiceNum: f.invoiceNum, fWarehouse: f.warehouse, warehouseOptions: this.WAREHOUSES,\n      onFInvoiceNum: e => this.setForm(\"invoiceNum\", e.target.value),\n      onFWarehouse: e => this.setForm(\"warehouse\", e.target.value),\n      onSaveInvoice: () => this.saveInvoice(),\n    };\n  }\n  vmAddRoute(order) {\n    const f = this.state.form;\n    const routeOptions = this.state.routes.filter(r => !r.confirmed).map(r => {\n      const veh = this.vehicle(r.vehicle);\n      const tw = this.state.orders.filter(o => r.orders.includes(o.id)).reduce((a, o) => a + o.weight, 0);\n      const pct = veh ? Math.round(((tw + order.weight) / veh.cap) * 100) : 0;\n      return { value: r.id, label: r.id + \" · \" + (veh ? veh.name : \"—\") + \" · \" + r.direction + \" · \" + pct + \"% после добавления\" };\n    });\n    const baseToggle = { ...this.btnStyles().default, flex: 1 };\n    return {\n      arExisting: !f.createNew, arCreateNew: f.createNew,\n      onArExisting: () => this.setForm(\"createNew\", false), onArNew: () => this.setForm(\"createNew\", true),\n      arExistingStyle: { ...baseToggle, background: !f.createNew ? \"#E6F1FB\" : \"#F1F3F6\", color: !f.createNew ? \"#0C447C\" : \"#14171F\" },\n      arNewStyle: { ...baseToggle, background: f.createNew ? \"#E6F1FB\" : \"#F1F3F6\", color: f.createNew ? \"#0C447C\" : \"#14171F\" },\n      fRouteId: f.routeId, onFRouteId: e => this.setForm(\"routeId\", e.target.value), routeOptions,\n      fVehicle: f.vehicle, onFVehicle: e => this.setForm(\"vehicle\", e.target.value),\n      vehicleOptions: this.VEHICLES.map(v => ({ value: v.id, label: v.name + \" (\" + v.cap + \" кг)\" })),\n      fDriver: f.driver, onFDriver: e => this.setForm(\"driver\", e.target.value), driverOptions: this.DRIVERS,\n      arOrderId: order.id, arSummaryRest: order.client + \" · \" + order.direction + \" · \" + order.weight + \" кг\",\n      onSaveRoute: () => this.saveAddToRoute(),\n    };\n  }\n  vmDetail(order) {\n    const fields = [[\"Клиент\", order.client], [\"Тип\", order.type], [\"Направление\", order.direction], [\"Адрес\", order.address], [\"Телефон\", order.phone || \"—\"], [\"Вес\", order.weight + \" кг\"], [\"Накладная\", order.invoice || \"—\"], [\"Склад\", order.warehouse || \"—\"], [\"Водитель\", order.driver || \"—\"], [\"Статус\", this.badgeLabel(order.status)]];\n    return {\n      dtFields: fields.map(([k, v]) => ({ k, v })),\n      dtItems: order.items, dtHasNotes: !!order.notes, dtNotes: order.notes,\n      dtTimeline: order.timeline,\n      dtShowCancel: order.status === \"search\",\n      onCancelOrder: () => this.cancelOrder(),\n    };\n  }\n  vmPhoto(order) {\n    const f = this.state.form;\n    return {\n      phNotDone: !f.photoDone, phDone: !!f.photoDone,\n      phPrompt: \"Сфотографируйте подписанную накладную формы 2.7 клиента \" + order.client,\n      phFileLine: \"nakl_\" + order.id + \".jpg · Накладная принята, теперь можно нажать «Доставлено»\",\n      phDoneBtnStyle: { ...this.btnStyles().success, width: \"100%\" },\n      onPhotoUpload: () => this.uploadPhoto(),\n    };\n  }\n  vmNewTransfer() {\n    const f = this.state.form;\n    return {\n      fFrom: f.from, fTo: f.to, fItems: f.items, fWeight: f.weight, fNotes: f.notes,\n      warehouseOptions: this.WAREHOUSES, toOptions: [\"Магазин Туритай 14Б\", \"Магазин Азовская 1А\", \"Магазин Таусамал\"],\n      onFFrom: e => this.setForm(\"from\", e.target.value),\n      onFTo: e => this.setForm(\"to\", e.target.value),\n      onFItems: e => this.setForm(\"items\", e.target.value),\n      onFWeight: e => this.setForm(\"weight\", e.target.value),\n      onFNotes: e => this.setForm(\"notes\", e.target.value),\n      onSaveTransfer: () => this.saveNewTransfer(),\n    };\n  }\n  vmNotifs() {\n    return {\n      ntEmpty: this.state.notifications.length === 0,\n      ntRows: this.state.notifications.map(n => ({ text: (n.type === \"warning\" ? \"⚠️ \" : \"ℹ️ \") + n.text, onDismiss: () => this.dismissNotif(n.id) })),\n    };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const role = s.role;\n    if (!role) {\n      return {\n        notLoggedIn: true, loggedIn: false, showModal: false,\n        roleOptions: Object.entries(this.ROLES).map(([k, v]) => ({\n          key: k, label: v.label, icon: v.icon,\n          onSelect: () => this.setState({ loginSel: k }),\n          style: this.roleBtnStyle(s.loginSel === k),\n        })),\n        onLoginConfirm: () => { if (s.loginSel) this.login(s.loginSel); },\n        loginDisabled: !s.loginSel,\n        loginBtnStyle: { ...this.btnStyles().primary, width: \"100%\", textAlign: \"center\", opacity: s.loginSel ? 1 : 0.5, cursor: s.loginSel ? \"pointer\" : \"not-allowed\" },\n      };\n    }\n    const ac = this.accent();\n    const unread = s.notifications.filter(n => !n.read).length;\n    const tab = s.tab;\n    const out = {\n      notLoggedIn: false, loggedIn: true, btn: this.btnStyles(),\n      logoStyle: { width: 32, height: 32, borderRadius: 8, background: ac, display: \"flex\", alignItems: \"center\", justifyContent: \"center\", color: \"#fff\", fontSize: 16 },\n      roleLine: this.ROLES[role].icon + \" \" + this.ROLES[role].label,\n      onLogout: () => this.logout(),\n      unreadCount: unread, showUnread: unread > 0,\n      onOpenNotifs: () => this.openModal(\"notifications\"),\n      tabs: this.TAB_LISTS[role].map(t => ({ label: this.TAB_LABELS[t], style: this.tabStyle(tab === t), onClick: () => this.setTab(t) })),\n      isManagerOrders: false, isRoutes: false, isLoading: false, isTransfers: false, isQueue: false, isPicking: false, isMyRoute: false, isHistory: false,\n    };\n    if (role === \"manager\" && tab === \"orders\") { out.isManagerOrders = true; Object.assign(out, this.vmManagerOrders()); }\n    if ((role === \"manager\" || role === \"logist\") && tab === \"routes\") { out.isRoutes = true; Object.assign(out, this.vmRoutes()); }\n    if ((role === \"manager\" || role === \"logist\") && tab === \"loading\") { out.isLoading = true; Object.assign(out, this.vmLoading()); }\n    if ([\"manager\", \"logist\", \"warehouse\", \"picker\"].includes(role) && tab === \"transfers\") { out.isTransfers = true; Object.assign(out, this.vmTransfers()); }\n    if ([\"warehouse\", \"picker\"].includes(role) && tab === \"queue\") { out.isQueue = true; Object.assign(out, this.vmQueue()); }\n    if ([\"warehouse\", \"picker\"].includes(role) && tab === \"picking\") { out.isPicking = true; Object.assign(out, this.vmPicking()); }\n    if (role === \"driver\" && tab === \"myroute\") { out.isMyRoute = true; Object.assign(out, this.vmDriver()); }\n    if (role === \"driver\" && tab === \"history\") { out.isHistory = true; Object.assign(out, this.vmHistory()); }\n    Object.assign(out, this.vmModal());\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
